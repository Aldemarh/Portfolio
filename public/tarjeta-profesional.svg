<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" fill="none">
  <defs>
    <clipPath id="card"><rect x="0" y="0" width="640" height="400" rx="24"/></clipPath>
  </defs>
  <g clip-path="url(#card)">
    <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
    <!-- Esquina superior izquierda -->
    <path d="M0 0 L210 0 L0 210 Z" fill="#F6C700"/>
    <path d="M0 0 L120 0 L0 120 Z" fill="#151515"/>
    <!-- Banda inferior izquierda -->
    <path d="M0 300 L275 400 L0 400 Z" fill="#F6C700"/>

    <!-- Resolución -->
    <text x="150" y="42" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="15">Resolución RN2025NALA001706</text>
    <text x="150" y="62" fill="#333" font-family="Segoe UI, Arial, sans-serif" font-size="15">del 26/09/2025</text>

    <!-- Logo COPNIA -->
    <g transform="translate(430 28)">
      <polygon points="20,2 38,12 38,32 20,42 2,32 2,12" fill="#151515"/>
      <circle cx="20" cy="22" r="9" fill="#ffffff"/>
      <circle cx="20" cy="22" r="4.5" fill="#151515"/>
      <text x="52" y="20" fill="#151515" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">COPNIA</text>
      <text x="52" y="36" fill="#666" font-family="Segoe UI, Arial, sans-serif" font-size="8.5">Consejo Profesional Nacional de Ingeniería</text>
    </g>

    <!-- Sello / logo grande -->
    <rect x="60" y="150" width="130" height="130" rx="6" fill="#f4f4f4" stroke="#e2e2e2"/>
    <g transform="translate(125 215)" opacity="0.35">
      <polygon points="0,-34 30,-17 30,17 0,34 -30,17 -30,-17" fill="#cfcfcf"/>
      <circle cx="0" cy="0" r="15" fill="#f4f4f4"/>
      <circle cx="0" cy="0" r="7" fill="#cfcfcf"/>
    </g>

    <!-- Datos -->
    <text x="215" y="180" fill="#111" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="800">INGENIERÍA DE SISTEMAS</text>
    <text x="215" y="222" fill="#222" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Aldemar José Hernández Hernández</text>
    <text x="215" y="262" fill="#444" font-family="Segoe UI, Arial, sans-serif" font-size="15">Universidad Cooperativa de Colombia</text>

    <!-- Matrícula -->
    <text x="28" y="352" fill="#151515" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">MATRÍCULA PROFESIONAL</text>
    <text x="28" y="377" fill="#151515" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">081122-0793653 COR</text>

    <!-- Verificable -->
    <text x="400" y="377" fill="#8a8a8a" font-family="Segoe UI, Arial, sans-serif" font-size="12">Verificable en COPNIA ✓</text>
  </g>
  <rect x="0.5" y="0.5" width="639" height="399" rx="24" fill="none" stroke="#e2e8f0"/>
</svg>
