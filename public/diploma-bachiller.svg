<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 480" fill="none">
  <rect x="0" y="0" width="660" height="480" rx="6" fill="#fdfdff"/>
  <!-- Bordes -->
  <rect x="12" y="12" width="636" height="456" rx="4" fill="none" stroke="#1e3a5f" stroke-width="2.5"/>
  <rect x="20" y="20" width="620" height="440" rx="3" fill="none" stroke="#c9a227" stroke-width="1"/>

  <!-- Encabezado -->
  <text x="330" y="52" text-anchor="middle" fill="#1e3a5f" font-family="Georgia, serif" font-size="13" letter-spacing="2">REPÚBLICA DE COLOMBIA</text>
  <text x="330" y="70" text-anchor="middle" fill="#94a3b8" font-family="Georgia, serif" font-size="10" letter-spacing="1">MINISTERIO DE EDUCACIÓN NACIONAL</text>

  <!-- Sello -->
  <g transform="translate(330 120)">
    <circle r="38" fill="none" stroke="#c9a227" stroke-width="2"/>
    <circle r="30" fill="none" stroke="#dcc98f" stroke-width="1"/>
    <path d="M-16 6 L0 -20 L16 6 Z" fill="#cfd8e3"/>
    <rect x="-3" y="6" width="6" height="14" fill="#cfd8e3"/>
  </g>

  <!-- Institución -->
  <text x="330" y="188" text-anchor="middle" fill="#1e3a5f" font-family="Georgia, serif" font-size="22" font-weight="700">Escuela Normal Superior de Montería</text>
  <text x="330" y="214" text-anchor="middle" fill="#94a3b8" font-family="Georgia, serif" font-size="13" font-style="italic">otorga el título de</text>

  <!-- Título -->
  <text x="330" y="270" text-anchor="middle" fill="#1e3a5f" font-family="Georgia, serif" font-size="33" font-weight="700" letter-spacing="1">BACHILLER ACADÉMICO</text>

  <!-- Nombre -->
  <text x="330" y="312" text-anchor="middle" fill="#334155" font-family="Georgia, serif" font-size="19" font-weight="600">Aldemar José Hernández Hernández</text>
  <text x="330" y="340" text-anchor="middle" fill="#94a3b8" font-family="Georgia, serif" font-size="13">Montería, diciembre de 2017</text>

  <!-- Firmas -->
  <g stroke="#cbd5e1" stroke-width="1.2">
    <line x1="130" y1="410" x2="270" y2="410"/>
    <line x1="390" y1="410" x2="530" y2="410"/>
  </g>
  <text x="200" y="426" text-anchor="middle" fill="#94a3b8" font-family="Georgia, serif" font-size="11">Rector</text>
  <text x="460" y="426" text-anchor="middle" fill="#94a3b8" font-family="Georgia, serif" font-size="11">Secretario General</text>

  <text x="330" y="452" text-anchor="middle" fill="#b8b58f" font-family="Georgia, serif" font-size="9" letter-spacing="1">VIGILADA MINEDUCACIÓN</text>
