<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 450" fill="none">
  <defs>
    <linearGradient id="bgapp" x1="60" y1="40" x2="400" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#fbeaf2"/>
      <stop offset="1" stop-color="#f3b9d3"/>
    </linearGradient>
  </defs>
  <!-- Fondo squircle -->
  <rect x="20" y="20" width="410" height="410" rx="100" fill="url(#bgapp)"/>
  <!-- Ondas de sonido (4 diagonales) -->
  <g fill="none" stroke="#be4d96" stroke-width="15" stroke-linecap="round" transform="rotate(45 225 225)">
    <circle cx="225" cy="225" r="120" stroke-dasharray="83.8 104.7"/>
    <circle cx="225" cy="225" r="150" stroke-dasharray="104.7 130.9"/>
    <circle cx="225" cy="225" r="180" stroke-dasharray="125.7 157.1"/>
  </g>
  <!-- Circulo central -->
  <circle cx="225" cy="225" r="80" fill="#be4d96"/>
  <!-- Letra A -->
  <text x="225" y="270" text-anchor="middle" fill="#f3c9a9"
        font-family="'Arial Rounded MT Bold','Segoe UI',Arial,sans-serif"
        font-size="118" font-weight="800">A</text>
</svg>
