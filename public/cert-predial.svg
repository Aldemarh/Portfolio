<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" fill="none">
  <defs>
    <clipPath id="cp"><rect x="0" y="0" width="680" height="480" rx="6"/></clipPath>
  </defs>
  <g clip-path="url(#cp)">
    <rect x="0" y="0" width="680" height="480" fill="#f8faf7"/>

    <!-- Decoración esquina superior izquierda -->
    <path d="M0 0 L150 0 L0 150 Z" fill="#1b4d2e"/>
    <path d="M0 0 L95 0 L0 95 Z" fill="#2e7d32"/>

    <!-- Decoración lateral derecha -->
    <path d="M680 480 L680 190 L430 480 Z" fill="#2e7d32"/>
    <path d="M680 480 L680 300 L520 480 Z" fill="#3f9c46"/>
    <path d="M680 150 L680 60 L600 150 Z" fill="#c9a227"/>

    <!-- Borde dorado -->
    <rect x="12" y="12" width="656" height="456" rx="4" fill="none" stroke="#c9a227" stroke-width="1.5"/>

    <!-- Logo -->
    <g transform="translate(70 55)">
      <rect x="0" y="6" width="15" height="15" rx="4" fill="#3f9c46"/>
      <rect x="14" y="-2" width="15" height="15" rx="4" fill="#2e7d32"/>
      <rect x="9" y="16" width="15" height="15" rx="4" fill="#7cc47f"/>
      <text x="42" y="12" fill="#2e7d32" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">POLITÉCNICO</text>
      <text x="42" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700"><tspan fill="#2e7d32">FORMAR </tspan><tspan fill="#e8572a">INNOVAR</tspan></text>
    </g>

    <text x="490" y="52" fill="#6b7280" font-family="Segoe UI, Arial, sans-serif" font-size="10" letter-spacing="1">REPÚBLICA DE COLOMBIA</text>
    <text x="490" y="68" fill="#9ca3af" font-family="Segoe UI, Arial, sans-serif" font-size="10">Alcaldía de Montería</text>

    <!-- Contenido -->
    <text x="62" y="150" fill="#374151" font-family="Georgia, serif" font-size="18" font-weight="700" letter-spacing="1">HACE CONSTAR QUE</text>
    <text x="62" y="200" fill="#b9992f" font-family="Georgia, serif" font-size="27" font-weight="700">Aldemar José Hernández Hernández</text>
    <line x1="62" y1="214" x2="560" y2="214" stroke="#dcdcc8" stroke-width="1"/>

    <text x="62" y="248" fill="#6b7280" font-family="Georgia, serif" font-size="13">Asistió y aprobó el curso de</text>
    <text x="62" y="278" fill="#1b4d2e" font-family="Georgia, serif" font-size="23" font-weight="700">RECONOCEDOR PREDIAL INTEGRAL</text>
    <text x="62" y="304" fill="#6b7280" font-family="Georgia, serif" font-size="13">Duración: 1 crédito académico (48 horas)</text>

    <!-- Firmas -->
    <g stroke="#c9cdbe" stroke-width="1.2">
      <line x1="70" y1="370" x2="230" y2="370"/>
      <line x1="290" y1="370" x2="450" y2="370"/>
    </g>
    <text x="150" y="386" text-anchor="middle" fill="#9ca3af" font-family="Georgia, serif" font-size="11">Representante Legal</text>
    <text x="370" y="386" text-anchor="middle" fill="#9ca3af" font-family="Georgia, serif" font-size="11">Alcalde de Montería</text>

    <!-- Registro -->
    <text x="62" y="440" fill="#4b5563" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">ID del Registro: PFI-20231014-01</text>
    <text x="62" y="458" fill="#9ca3af" font-family="Segoe UI, Arial, sans-serif" font-size="11">Octubre de 2023 · PolitecnicoFormarinnovar.edu.co</text>
  </g>
</svg>
