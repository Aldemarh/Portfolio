<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 480" fill="none">
  <rect x="0" y="0" width="660" height="480" rx="6" fill="#fffef8"/>
  <!-- Bordes decorativos -->
  <rect x="12" y="12" width="636" height="456" rx="4" fill="none" stroke="#b9ad5a" stroke-width="2.5"/>
  <rect x="20" y="20" width="620" height="440" rx="3" fill="none" stroke="#d8cf8f" stroke-width="1"/>

  <!-- Encabezado -->
  <text x="330" y="52" text-anchor="middle" fill="#6b7280" font-family="Georgia, 'Times New Roman', serif" font-size="13" letter-spacing="2">REPÚBLICA DE COLOMBIA</text>
  <text x="330" y="70" text-anchor="middle" fill="#9ca3af" font-family="Georgia, 'Times New Roman', serif" font-size="10" letter-spacing="1">MINISTERIO DE EDUCACIÓN NACIONAL</text>

  <!-- Sello -->
  <g transform="translate(330 120)">
    <circle r="38" fill="none" stroke="#cbd0c2" stroke-width="2"/>
    <circle r="30" fill="none" stroke="#d8dccf" stroke-width="1"/>
    <path d="M0 -18 C 10 -6, 10 8, 0 20 C -10 8, -10 -6, 0 -18 Z" fill="#dfe3d6"/>
    <circle cx="0" cy="-2" r="6" fill="#cbd0c2"/>
  </g>

  <!-- Universidad -->
  <text x="330" y="190" text-anchor="middle" fill="#6b7280" font-family="Georgia, 'Times New Roman', serif" font-size="23" font-weight="700">Universidad Cooperativa de Colombia</text>
  <text x="330" y="216" text-anchor="middle" fill="#9ca3af" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic">le confiere el título de</text>

  <!-- Título -->
  <text x="330" y="272" text-anchor="middle" fill="#374151" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" letter-spacing="1">INGENIERO DE SISTEMAS</text>

  <!-- Nombre -->
  <text x="330" y="312" text-anchor="middle" fill="#4b5563" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="600">Aldemar José Hernández Hernández</text>
  <text x="330" y="340" text-anchor="middle" fill="#9ca3af" font-family="Georgia, 'Times New Roman', serif" font-size="13">Montería, 15 de septiembre de 2023</text>

  <!-- Firmas -->
  <g stroke="#c9cdbe" stroke-width="1.2">
    <line x1="95" y1="410" x2="215" y2="410"/>
    <line x1="270" y1="410" x2="390" y2="410"/>
    <line x1="445" y1="410" x2="565" y2="410"/>
  </g>
  <text x="155" y="426" text-anchor="middle" fill="#9ca3af" font-family="Georgia, serif" font-size="11">Director de Sede</text>
  <text x="330" y="426" text-anchor="middle" fill="#9ca3af" font-family="Georgia, serif" font-size="11">Rector</text>
  <text x="505" y="426" text-anchor="middle" fill="#9ca3af" font-family="Georgia, serif" font-size="11">Secretario General</text>

  <text x="330" y="452" text-anchor="middle" fill="#b8b58f" font-family="Georgia, serif" font-size="9" letter-spacing="1">VIGILADA MINEDUCACIÓN</text>
</svg>
